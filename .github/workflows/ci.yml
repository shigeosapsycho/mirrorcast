name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # We don't launch Electron here — skip the big binary download.
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Syntax check all JS
        run: |
          node -e "
          const cp=require('child_process'), fs=require('fs');
          const walk=(d)=>fs.readdirSync(d,{withFileTypes:true}).flatMap(e=>e.isDirectory()?walk(d+'/'+e.name):(e.name.endsWith('.js')?[d+'/'+e.name]:[]));
          for(const f of [...walk('src'),...walk('scripts')]){cp.execSync('node --check \"'+f+'\"');}
          console.log('syntax ok');
          "

      - name: Headless video pipeline selftest (ingest -> ffmpeg -> frames)
        run: node scripts/stream-test.js --selftest
