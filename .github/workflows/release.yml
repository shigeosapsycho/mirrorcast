name: Release

# Build installers for Windows (.exe + .msi) and macOS (.dmg).
#  - Push a tag  v*      -> build AND publish a GitHub Release (auto-update feed)
#  - Run manually (Actions tab / gh workflow run) -> build + upload artifacts only
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No Apple Developer cert — don't attempt macOS code signing.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        # Publish only for tag builds; manual runs just produce artifacts.
        run: npx electron-builder --publish ${{ startsWith(github.ref, 'refs/tags/v') && 'always' || 'never' }}

      - name: Upload installers as run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mirrorcast-${{ matrix.os }}
          if-no-files-found: error
          path: |
            release/*.exe
            release/*.msi
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest*.yml
