appId: com.mirrorcast.app
productName: MirrorCast
copyright: Copyright © 2026 MirrorCast

# Auto-update feed — electron-updater reads this from the packaged app.
publish:
  provider: github
  owner: shigeosapsycho
  repo: mirrorcast

directories:
  output: release
  buildResources: assets

files:
  - src/**/*
  - assets/**/*
  - package.json
  - "!**/*.map"

# Optional: drop a FairPlay engine binary in resources/engine/ to ship a
# self-contained build (see resources/engine/README.md re: GPL). The folder is
# copied to <app>/resources/engine and auto-detected by EngineController.
extraResources:
  - from: resources/engine
    to: engine
    filter: ["**/*"]

# ffmpeg-static ships a platform binary inside node_modules. Keep it unpacked
# from the asar archive so it stays executable at runtime.
asarUnpack:
  - "node_modules/ffmpeg-static/**"

# Portable/installer icons are generated by scripts/generate-icon.js.
win:
  target:
    - target: nsis      # MirrorCast-Setup-x.y.z.exe (auto-updating installer)
      arch: [x64]
    - target: msi       # MirrorCast-x.y.z.msi (enterprise/manual install)
      arch: [x64]
  icon: assets/icon.png

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: MirrorCast

mac:
  category: public.app-category.video
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: assets/icon.png
  # AirPlay needs to accept inbound connections; declare network entitlement.
  extendInfo:
    NSLocalNetworkUsageDescription: >-
      MirrorCast advertises itself on your local network so your iPhone can
      find it for screen mirroring.

linux:
  target:
    - AppImage
  category: AudioVideo
  icon: assets/icon.png
